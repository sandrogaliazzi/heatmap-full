name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Criar .env.production
        working-directory: frontend
        run: |
          cat > .env.production << 'EOF'
          ${{ secrets.FRONTEND_ENV_PRODUCTION }}
          EOF

      - name: Instalar dependências do frontend
        working-directory: frontend
        run: npm ci

      - name: Build do frontend
        working-directory: frontend
        run: npm run build

      - name: Validar build gerado
        run: |
          test -d frontend/dist
          test -f frontend/dist/index.html

      - name: Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Adicionar servidor ao known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Gerar timestamp da release
        run: echo "TIMESTAMP=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Criar diretório da nova release no servidor
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p /home/administrador/heatmap-full/heatmap-full/frontend/releases/${{ env.TIMESTAMP }}"

      - name: Enviar build do frontend para o servidor
        run: |
          rsync -avz \
            frontend/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }}:/home/administrador/heatmap-full/heatmap-full/frontend/releases/${{ env.TIMESTAMP }}/

      - name: Atualizar backend e ativar release
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "TIMESTAMP='${{ env.TIMESTAMP }}' bash -s" << 'EOF'
          set -e

          APP_DIR=/home/administrador/heatmap-full/heatmap-full
          FRONT_DIR="$APP_DIR/frontend"
          RELEASES_DIR="$FRONT_DIR/releases"
          NEW_RELEASE="$RELEASES_DIR/$TIMESTAMP"

          cd "$APP_DIR"

          echo "==> Atualizando código do backend"
          git pull origin main

          echo "==> Rebuildando containers do backend"
          docker-compose up -d --build

          echo "==> Ajustando permissões do frontend"
          chmod -R 755 "$NEW_RELEASE"

          echo "==> Ativando nova release do frontend"
          ln -sfn "$NEW_RELEASE" "$FRONT_DIR/current"

          echo "==> Limpando releases antigas"
          cd "$RELEASES_DIR"
          ls -dt */ | tail -n +6 | xargs -r rm -rf

          echo "==> Validando e recarregando Nginx"
          sudo nginx -t
          sudo systemctl reload nginx

          echo "==> Limpando imagens Docker antigas"
          docker image prune -f
          EOF