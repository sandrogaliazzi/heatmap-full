# =========================
# Limite de requisições no login
# =========================
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# =========================
# FRONTEND - HTTP -> HTTPS
# =========================
server {
    listen 80;
    server_name heatmap.conectnet.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================
# FRONTEND - HTTPS
# =========================
server {
    listen 443 ssl http2;
    server_name heatmap.conectnet.net;

    ssl_certificate /etc/letsencrypt/live/heatmap.conectnet.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heatmap.conectnet.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/administrador/heatmap-full/heatmap-full/frontend/dist;
    index index.html;

    # -------------------------
    # index.html SEM CACHE
    # -------------------------
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        etag on;
    }

    # -------------------------
    # Assets estáticos com cache forte
    # IMPORTANTE:
    # não deixar cair no fallback da SPA
    # -------------------------
    location ~* \.(?:js|mjs|css|map|woff|woff2|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # -------------------------
    # SPA fallback
    # -------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# =========================
# API - HTTP -> HTTPS
# =========================
server {
    listen 80;
    server_name api.heatmap.conectnet.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================
# API - HTTPS
# =========================
server {
    listen 443 ssl http2;
    server_name api.heatmap.conectnet.net;

    ssl_certificate /etc/letsencrypt/live/heatmap.conectnet.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heatmap.conectnet.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------
    # Login com rate limit
    # -------------------------
    location /login {
        limit_req zone=login_limit burst=10 nodelay;

        proxy_pass http://177.73.28.18:5005;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "https://heatmap.conectnet.net" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Cache-Control, Pragma, Expires, Content-Type, Accept, Authorization, x-access-token" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # -------------------------
    # Demais rotas da API
    # -------------------------
    location / {
        proxy_pass http://177.73.28.18:5005;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "https://heatmap.conectnet.net" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Cache-Control, Pragma, Expires, Content-Type, Accept, Authorization, x-access-token" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}