# Configuração da limitação de requisições para login
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# HTTP -> HTTPS redirect for main domain
server {
    listen 80;
    server_name heatmap.conectnet.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for main domain
server {
    listen 443 ssl;
    server_name heatmap.conectnet.net;

    # Certbot-managed SSL
    ssl_certificate /etc/letsencrypt/live/heatmap.conectnet.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heatmap.conectnet.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/administrador/heatmap-full/heatmap-full/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

}

# HTTP -> HTTPS redirect for API subdomain
server {
    listen 80;
    server_name api.heatmap.conectnet.net;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for API subdomain
server {
    listen 443 ssl;
    server_name api.heatmap.conectnet.net;

    # Certbot-managed SSL (using same certificate as main domain)
    ssl_certificate /etc/letsencrypt/live/heatmap.conectnet.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heatmap.conectnet.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proteção contra muitas tentativas de login
    location /login {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://177.73.28.18:5005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "https://heatmap.conectnet.net" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With,Cache-Control,Pragma,Expires, Content-Type, Accept, Authorization, x-access-token" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        proxy_pass http://177.73.28.18:5005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "https://heatmap.conectnet.net" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With,Cache-Control,Pragma,Expires, Content-Type, Accept, Authorization, x-access-token" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
