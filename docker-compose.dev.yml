version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: heatmap-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heatmap-backend-dev
    working_dir: /app
    ports:
      - "5005:5005"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    command: npm run dev
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: heatmap-frontend-dev
    working_dir: /app
    ports:
      - "5000:5000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5005
      - CHOKIDAR_USEPOLLING=true
      - VITE_HMR_HOST=localhost
      - VITE_HMR_CLIENT_PORT=5000
    command: npm run dev
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
